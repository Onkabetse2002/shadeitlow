<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - DARKIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-['Poppins']">

    <nav class="navbar bg-white border-b border-gray-100 py-4 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="index.html">
                <img src="shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="h-10">
            </a>
            <div class="hidden md:flex space-x-8 uppercase tracking-widest text-sm font-medium">
                <a href="index.html" class="hover:text-gray-500">Home</a>
                <a href="shop.html" class="hover:text-gray-500">Shop</a>
                <a href="gallery.html" class="hover:text-gray-500">Gallery</a>
                <a href="about.html" class="hover:text-gray-500">About</a>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <a href="cart.html" class="text-xl text-black">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-badge absolute -top-2 -right-2 bg-black text-white text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-12 bg-gray-50">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl font-bold uppercase tracking-tighter">Shopping Cart</h1>
            <p class="text-gray-500 mt-2 tracking-widest uppercase text-xs">Review your selection before paying</p>
        </div>
    </section>

    <section class="py-16 min-h-[50vh]">
        <div class="container mx-auto px-4 max-w-5xl">
            <div class="hidden md:grid grid-cols-4 border-b-2 border-black pb-4 mb-8 uppercase tracking-widest text-xs font-bold">
                <div class="col-span-2">Product</div>
                <div class="text-center">Quantity</div>
                <div class="text-right">Total</div>
            </div>

            <div id="cart-items-list" class="space-y-8">
                </div>

            <div id="empty-cart-msg" class="hidden text-center py-20">
                <i class="fas fa-shopping-cart text-5xl text-gray-200 mb-4"></i>
                <p class="text-gray-400 italic text-lg">Your cart is currently empty.</p>
                <a href="shop.html" class="inline-block mt-6 px-10 py-3 bg-black text-white uppercase tracking-widest text-sm hover:bg-gray-800 transition">Start Shopping</a>
            </div>

            <div id="cart-summary" class="mt-16 border-t border-gray-100 pt-8 flex flex-col items-end">
                <div class="w-full md:w-1/3 space-y-4">
                    <div class="flex justify-between items-center text-sm uppercase tracking-widest">
                        <span>Subtotal</span>
                        <span id="subtotal-amount">R0.00</span>
                    </div>
                    <div class="flex justify-between items-center text-2xl font-bold border-t border-black pt-4">
                        <span>Total</span>
                        <span id="total-amount">R0.00</span>
                    </div>
                    <div class="pt-6 flex flex-col gap-3">
                        <a href="backend/pages/checkout.html" class="w-full bg-black text-white py-5 text-center uppercase tracking-[0.2em] font-bold hover:bg-gray-800 transition shadow-xl">
                            Proceed to Checkout
                        </a>
                        <button onclick="clearAllItems()" class="text-[10px] uppercase tracking-widest text-gray-400 hover:text-red-500 transition">
                            Clear Shopping Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-black text-white py-12">
        <div class="container mx-auto px-4 text-center">
            <p class="tracking-[0.4em] font-light text-[10px] opacity-60 uppercase">&copy; 2026 DARKIS. Shade it Low.</p>
        </div>
    </footer>

    <script>
        function getCart() {
            const data = localStorage.getItem('cart');
            return data ? JSON.parse(data) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCartPage();
            updateGlobalBadge();
        }

        function updateGlobalBadge() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('.cart-badge').forEach(b => {
                b.textContent = count;
                b.style.display = count > 0 ? 'inline' : 'none';
            });
        }

        function updateQty(index, delta) {
            const cart = getCart();
            if (cart[index]) {
                const newQty = cart[index].quantity + delta;
                if (newQty > 0) {
                    cart[index].quantity = newQty;
                    saveCart(cart);
                }
            }
        }

        function removeOneItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
        }

        function clearAllItems() {
            if (confirm("Clear your entire cart?")) {
                saveCart([]);
            }
        }

        function renderCartPage() {
            const cart = getCart();
            const list = document.getElementById('cart-items-list');
            const summary = document.getElementById('cart-summary');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const totalEl = document.getElementById('total-amount');
            const subtotalEl = document.getElementById('subtotal-amount');

            if (cart.length === 0) {
                list.innerHTML = '';
                summary.classList.add('hidden');
                emptyMsg.classList.remove('hidden');
                return;
            }

            emptyMsg.classList.add('hidden');
            summary.classList.remove('hidden');

            let grandTotal = 0;

            list.innerHTML = cart.map((item, index) => {
                const rowTotal = item.price * item.quantity;
                grandTotal += rowTotal;
                return `
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-center border-b border-gray-50 pb-8">
                        <div class="col-span-2 flex items-center space-x-6">
                            <img src="${item.image}" alt="${item.name}" class="w-24 h-24 object-cover bg-gray-100 shadow-sm">
                            <div>
                                <h3 class="font-bold uppercase tracking-wide text-lg">${item.name}</h3>
                                <p class="text-xs text-gray-400 uppercase tracking-widest mt-1">Price: R${item.price.toFixed(2)}</p>
                                <button onclick="removeOneItem(${index})" class="text-[10px] text-red-400 uppercase tracking-widest mt-4 hover:text-red-600 transition">Remove</button>
                            </div>
                        </div>
                        <div class="flex justify-center">
                            <div class="flex items-center border border-black h-10">
                                <button onclick="updateQty(${index}, -1)" class="px-3 hover:bg-gray-100">-</button>
                                <span class="px-4 font-bold text-sm">${item.quantity}</span>
                                <button onclick="updateQty(${index}, 1)" class="px-3 hover:bg-gray-100">+</button>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-xl font-bold">R${rowTotal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');

            totalEl.textContent = `R${grandTotal.toFixed(2)}`;
            subtotalEl.textContent = `R${grandTotal.toFixed(2)}`;
        }

        // Initialize Page
        window.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
            updateGlobalBadge();
        });
    </script>
</body>
</html>
