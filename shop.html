<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - DARKIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; overflow-x: hidden; }
        .navbar { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 60px 20px; max-width: 1400px; margin: 0 auto; }
        .product-card { background: #111; padding: 15px; border: 1px solid rgba(255,255,255,0.03); transition: 0.4s; text-align: center; }
        .product-img-box { width: 100%; height: 400px; background: #000; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .cart-drawer { position: fixed; right: -100%; top: 0; width: 550px; height: 100%; background: #111; border-left: 1px solid rgba(255,255,255,0.05); transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); z-index: 6000; padding: 40px; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        .cart-drawer.open { right: 0; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 5000; overflow-y: auto; }
        .modal-content { max-width: 1100px; margin: 60px auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; padding: 40px; position: relative; }

        .checkout-input { width: 100%; padding: 16px; margin-bottom: 12px; border: 1px solid #222; background: #0a0a0a; color: #fff; font-size: 0.75rem; outline: none; }
        .btn-luxury { background: #fff; color: #000; width: 100%; padding: 20px; border: none; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: 0.3s; }

        @media (max-width: 768px) { .cart-drawer { width: 100%; } .modal-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar py-6">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html"><img src="shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="h-8 md:h-10 brightness-0 invert"></a>
            <div class="flex items-center space-x-12">
                <div class="hidden md:flex space-x-12 uppercase tracking-[0.2em] text-[10px] font-black">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="gallery.html">Gallery</a>
                </div>
                <button class="relative text-white text-xl" onclick="toggleCart(true)">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-[9px] w-5 h-5 flex items-center justify-center rounded-full font-black">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="product-grid" id="main-grid"></div>

    <div id="modal" class="modal-overlay">
        <div class="p-10 text-[10px] tracking-[0.3em] font-bold cursor-pointer opacity-50 text-white" onclick="closeModal()">[←] BACK TO COLLECTION</div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <div id="cart" class="cart-drawer flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl tracking-widest uppercase font-light">Your Bag</h2>
            <div class="cursor-pointer font-bold text-[10px] tracking-widest opacity-40" onclick="toggleCart(false)">CLOSE [X]</div>
        </div>
        
        <div id="cart-list" class="flex-grow overflow-y-auto mb-8"></div>

        <div class="border-t border-white/10 pt-8">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="fn" class="checkout-input" placeholder="FIRST NAME">
                <input type="text" id="ln" class="checkout-input" placeholder="LAST NAME">
            </div>
            <input type="email" id="em" class="checkout-input" placeholder="EMAIL ADDRESS">
            <input type="tel" id="ph" class="checkout-input" placeholder="PHONE NUMBER">
            <textarea id="adr" class="checkout-input" style="height: 80px; resize: none;" placeholder="SHIPPING ADDRESS (STREET, CITY, POSTAL CODE)"></textarea>
            
            <div class="flex justify-between items-center mb-6 pt-4">
                <span class="text-[10px] uppercase tracking-widest opacity-50">Total (Inc. R100 Delivery)</span>
                <span id="total-display" class="text-3xl font-bold">R0.00</span>
            </div>
            
            <button class="btn-luxury" onclick="processPayNow()">Pay with PayFast</button>
        </div>
    </div>

    <form id="pf-form" action="https://www.payfast.co.za/eng/process" method="POST" style="display:none;">
        <input type="hidden" name="merchant_id" value="34524679">
        <input type="hidden" name="merchant_key" value="1tbfpjuomlb06">
        <input type="hidden" name="return_url" value="https://darkis.co.za/success.html">
        <input type="hidden" name="cancel_url" value="https://darkis.co.za/shop.html">
        <input type="hidden" name="name_first" id="pf-fn">
        <input type="hidden" name="name_last" id="pf-ln">
        <input type="hidden" name="email_address" id="pf-em">
        <input type="hidden" name="cell_number" id="pf-ph">
        <input type="hidden" name="amount" id="pf-amt">
        <input type="hidden" name="item_name" id="pf-items">
    </form>

    <script>
        const products = [
            { id: 1, name: "The Luminous Orange", price: 600, images: ["shadesimages/shades/The Luminous Orange R.jpg", "shadesimages/shades/The Luminous Orange L.jpg", "shadesimages/shades/The Luminous Orange F.jpg"] },
            { id: 2, name: "The Luminous Purple", price: 600, images: ["shadesimages/shades/The Luminous Purple R.jpg", "shadesimages/shades/The Luminous Purple L.jpg", "shadesimages/shades/The Luminous Purple F.jpg"] },
            { id: 3, name: "The Luminous Blue", price: 600, images: ["shadesimages/shades/The Luminous Blue f.jpg", "shadesimages/shades/The Luminous Blue L.jpg", "shadesimages/shades/The Luminous Blue R.jpg"] },
            { id: 4, name: "The Havenlight Green", price: 600, images: ["shadesimages/shades/The Havenlight Green L.jpg", "shadesimages/shades/The Havenlihgt Green R.jpg", "shadesimages/shades/The Havenlight Green F.jpg"] },
            { id: 5, name: "Thee Havenlight Sky", price: 600, images: ["shadesimages/shades/The Havenlight Sky L.jpg", "shadesimages/shades/The Havenlight Sky F.jpg"] },
            { id: 6, name: "The Havenlight Dawn", price: 600, images: ["shadesimages/shades/The Heaven Light Dawn L.jpg", "shadesimages/shades/The Heaven Light Dawn R.jpg", "shadesimages/shades/The Heaven Light Dawn F.jpg"] }
        ];

        let cart = [];
        let cur = null;
        let sIdx = 0;

        function init() {
            document.getElementById('main-grid').innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-img-box"><img src="${p.images[0]}" alt="${p.name}"></div>
                    <h3 class="text-xs tracking-widest uppercase font-bold mb-2">${p.name}</h3>
                    <p class="text-lg font-light mb-6">R${p.price.toFixed(2)}</p>
                    <button class="bg-white text-black w-full py-4 text-[10px] font-black uppercase" onclick="openP(${p.id})">Details</button>
                </div>`).join('');
            updateCartUI();
        }

        function openP(id) {
            cur = products.find(p => p.id === id); sIdx = 0;
            renderM(); document.getElementById('modal').style.display = 'block';
        }

        function renderM() {
            document.getElementById('modal-content').innerHTML = `
                <div class="relative overflow-hidden aspect-square bg-zinc-900 rounded-3xl">
                    <div class="flex transition-transform duration-700 h-full" style="transform: translateX(-${sIdx * 100}%)">
                        ${cur.images.map(img => `<img src="${img}" class="min-w-full h-full object-cover">`).join('')}
                    </div>
                    <div class="absolute inset-0 flex justify-between items-center px-4">
                        <button onclick="changeS(-1)" class="w-10 h-10 bg-black/50 rounded-full">❮</button>
                        <button onclick="changeS(1)" class="w-10 h-10 bg-black/50 rounded-full">❯</button>
                    </div>
                </div>
                <div class="flex flex-col justify-center">
                    <h1 class="text-6xl font-black uppercase tracking-tighter mb-4">${cur.name}</h1>
                    <div class="text-4xl font-bold mb-10">R${cur.price.toFixed(2)}</div>
                    <button class="btn-luxury" onclick="add()">Add to Bag</button>
                </div>`;
        }

        function changeS(n) { sIdx = (sIdx + n + cur.images.length) % cur.images.length; renderM(); }

        function add() {
            const ex = cart.find(i => i.id === cur.id);
            if(ex) ex.q++; else cart.push({...cur, q: 1});
            closeModal(); updateCartUI(); toggleCart(true);
        }

        function updateCartUI() {
            let subt = 0; let totalQ = 0;
            document.getElementById('cart-list').innerHTML = cart.map((item, idx) => {
                subt += (item.price * item.q); totalQ += item.q;
                return `<div class="flex justify-between items-center mb-6 pb-6 border-b border-white/5">
                            <div><b class="text-xs uppercase">${item.name}</b><br/><span class="text-[10px] opacity-40">Qty: ${item.q}</span></div>
                            <button onclick="rem(${idx})" class="text-red-500 text-[9px] font-bold">REMOVE</button>
                        </div>`;
            }).join('');
            const total = subt > 0 ? subt + 100 : 0;
            document.getElementById('total-display').innerText = `R${total.toFixed(2)}`;
            document.getElementById('cart-count').innerText = totalQ;
        }

        function rem(idx) { cart.splice(idx, 1); updateCartUI(); }

        function processPayNow() {
            const f = document.getElementById('fn').value;
            const l = document.getElementById('ln').value;
            const e = document.getElementById('em').value;
            const p = document.getElementById('ph').value;
            const a = document.getElementById('adr').value;

            if(!f || !e || !p || !a || cart.length === 0) return alert("Please complete your name, email, phone, and shipping address.");

            const subt = cart.reduce((s, i) => s + (i.price * i.q), 0);
            const total = (subt + 100).toFixed(2);
            
            // Item description now includes phone and address so it's all in your notification
            const detailsForMerchant = cart.map(i => `${i.name} (x${i.q})`).join(', ') + ` | PHONE: ${p} | SHIP TO: ${a}`;

            document.getElementById('pf-fn').value = f;
            document.getElementById('pf-ln').value = l;
            document.getElementById('pf-email').value = e;
            document.getElementById('pf-ph').value = p; // Standard PayFast field
            document.getElementById('pf-amt').value = total;
            document.getElementById('pf-items').value = detailsForMerchant;

            document.getElementById('pf-form').submit();
        }

        function toggleCart(s) { document.getElementById('cart').classList.toggle('open', s); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        init();
    </script>
</body>
</html>
