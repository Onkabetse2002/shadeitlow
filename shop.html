<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - DARKIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        
        /* Glassmorphism Navbar */
        .navbar { 
            background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            position: sticky; top: 0; z-index: 1000; 
        }

        /* High-Volume Grid System: 2 columns on mobile, up to 4 on desktop */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1px; 
            background-color: rgba(255,255,255,0.05); 
            max-width: 1600px; margin: 0 auto; 
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .product-card { 
            background: #050505; 
            padding: 20px 10px; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        /* Uniform Aspect Ratio for Scalability */
        .product-img-box { 
            width: 100%; 
            aspect-ratio: 4/5; 
            background: #111; 
            margin-bottom: 15px; 
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        .product-img-box img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1.2s ease;
        }

        .product-card:hover img { transform: scale(1.08); }

        /* Compact Mobile-First Typography */
        .product-name {
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 11px;
            font-weight: 300;
            opacity: 0.4;
            margin-bottom: 10px;
        }

        .explore-link {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
            width: fit-content;
            transition: 0.3s;
        }

        /* Cart Drawer UI */
        .cart-drawer { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 500px; height: 100%; 
            background: #0a0a0a; z-index: 6000; padding: 40px 25px; 
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); 
            box-shadow: -20px 0 60px rgba(0,0,0,0.8); 
        }
        .cart-drawer.open { transform: translateX(-100%); }

        .checkout-input { 
            width: 100%; padding: 15px 0; margin-bottom: 12px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            background: transparent; color: #fff; font-size: 0.75rem; outline: none;
        }

        .btn-luxury { 
            background: #fff; color: #000; width: 100%; padding: 20px; 
            font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; 
            font-size: 0.65rem; cursor: pointer; transition: 0.4s;
        }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 5000; overflow-y: auto; }
        .modal-content { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 0; position: relative; min-height: 100vh; }

        @media (max-width: 1023px) {
            .modal-content { grid-template-columns: 1fr; padding-bottom: 80px; }
        }

        .dot { height: 2px; width: 15px; background: rgba(255,255,255,0.2); display: inline-block; margin: 0 4px; transition: 0.3s; }
        .dot.active { background: #fff; width: 30px; }
    </style>
</head>
<body>

    <nav class="navbar py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html">
                <img src="shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="h-6 md:h-8 brightness-0 invert">
            </a>
            <div class="flex items-center space-x-8">
                <div class="hidden md:flex space-x-10 uppercase tracking-[0.3em] text-[9px] font-bold">
                    <a href="index.html">Home</a>
                    <a href="shop.html" class="border-b border-white">Collection</a>
                    <a href="gallery.html">Gallery</a>
                </div>
                <button class="relative text-white text-lg" onclick="toggleCart(true)">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-[7px] w-4 h-4 flex items-center justify-center rounded-full font-black">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="product-grid" id="main-grid"></div>

    <div id="modal" class="modal-overlay">
        <div class="fixed top-6 left-6 z-[6000] mix-blend-difference cursor-pointer text-[9px] tracking-[0.4em] font-bold" onclick="closeModal()">
            CLOSE [X]
        </div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <div id="cart" class="cart-drawer flex flex-col">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-[10px] tracking-[0.4em] uppercase font-bold opacity-30">Your Selection</h2>
            <div class="cursor-pointer font-bold text-[9px] tracking-[0.3em]" onclick="toggleCart(false)">CLOSE</div>
        </div>
        
        <div id="cart-list" class="flex-grow overflow-y-auto mb-10 custom-scrollbar"></div>

        <div class="pt-6 border-t border-white/5">
            <input type="text" id="fn" class="checkout-input" placeholder="FIRST NAME">
            <input type="text" id="ln" class="checkout-input" placeholder="LAST NAME">
            <input type="email" id="em" class="checkout-input" placeholder="EMAIL">
            <input type="tel" id="ph" class="checkout-input" placeholder="MOBILE NUMBER">
            <textarea id="adr" class="checkout-input h-16" placeholder="DELIVERY ADDRESS"></textarea>
            
            <div class="flex justify-between items-end mb-8 mt-4">
                <span class="text-[8px] uppercase tracking-[0.3em] opacity-40">Total Amount</span>
                <span id="total-display" class="text-3xl font-bold tracking-tighter">R0.00</span>
            </div>
            
            <button class="btn-luxury" onclick="processPayNow()">Finalize & Pay</button>
        </div>
    </div>

    <!-- Hidden PayFast Form -->
    <form id="pf-form" action="https://www.payfast.co.za/eng/process" method="POST" style="display:none;">
        <input type="hidden" name="merchant_id" value="34524679">
        <input type="hidden" name="merchant_key" value="1tbfpjuomlb06">
        <input type="hidden" name="return_url" value="https://darkis.co.za/success.html">
        <input type="hidden" name="cancel_url" value="https://darkis.co.za/shop.html">
        <input type="hidden" name="name_first" id="pf-fn">
        <input type="hidden" name="name_last" id="pf-ln">
        <input type="hidden" name="email_address" id="pf-em">
        <input type="hidden" name="cell_number" id="pf-ph">
        <input type="hidden" name="amount" id="pf-amt">
        <input type="hidden" name="item_name" id="pf-items">
    </form>

    <script>
        const products = [
            { id: 1, name: "The Luminous Orange", price: 600, images: ["shadesimages/shades/The Luminous Orange R.jpg", "shadesimages/shades/The Luminous Orange L.jpg", "shadesimages/shades/The Luminous Orange F.jpg"], desc: "Architectural precision meets vibrant optics. Hand-polished frames with full UV400 protection." },
            { id: 2, name: "The Luminous Purple", price: 600, images: ["shadesimages/shades/The Luminous Purple R.jpg", "shadesimages/shades/The Luminous Purple L.jpg", "shadesimages/shades/The Luminous Purple F.jpg"], desc: "A royal deep-tone aesthetic. Designed for the discerning urban collector." },
            { id: 3, name: "The Luminous Blue", price: 600, images: ["shadesimages/shades/The Luminous Blue f.jpg", "shadesimages/shades/The Luminous Blue L.jpg", "shadesimages/shades/The Luminous Blue R.jpg"], desc: "Electric azure clarity. Engineered for maximum visual impact and street-ready comfort." },
            { id: 4, name: "The Havenlight Green", price: 600, images: ["shadesimages/shades/The Havenlight Green L.jpg", "shadesimages/shades/The Havenlihgt Green R.jpg", "shadesimages/shades/The Havenlight Green F.jpg"], desc: "Forest-inspired minimalism. Lightweight frames crafted for daily luxury." },
            { id: 5, name: "Thee Havenlight Sky", price: 600, images: ["shadesimages/shades/The Havenlight Sky L.jpg", "shadesimages/shades/The Havenlight Sky F.jpg"], desc: "Ethereal sky optics. Clean lines and a cloud-light feel." },
            { id: 6, name: "The Havenlight Dawn", price: 600, images: ["shadesimages/shades/The Heaven Light Dawn L.jpg", "shadesimages/shades/The Heaven Light Dawn R.jpg", "shadesimages/shades/The Heaven Light Dawn F.jpg"], desc: "The signature transition piece. Sharp, professional, and uncompromisingly DARKIS." }
        ];

        let cart = [];
        let cur = null;
        let sIdx = 0;

        function init() {
            document.getElementById('main-grid').innerHTML = products.map(p => `
                <div class="product-card" onclick="openP(${p.id})">
                    <div class="product-img-box"><img src="${p.images[0]}" alt="${p.name}"></div>
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-price">R${p.price.toFixed(2)}</p>
                    <span class="explore-link">Details</span>
                </div>`).join('');
            updateCartUI();
        }

        function openP(id) {
            cur = products.find(p => p.id === id); sIdx = 0;
            renderM(); document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function renderM() {
            document.getElementById('modal-content').innerHTML = `
                <div class="relative w-full h-[55vh] lg:h-screen sticky top-0 overflow-hidden">
                    <div class="flex transition-transform duration-[1000ms] cubic-bezier(0.16, 1, 0.3, 1) h-full" style="transform: translateX(-${sIdx * 100}%)">
                        ${cur.images.map(img => `<img src="${img}" class="min-w-full h-full object-cover">`).join('')}
                    </div>
                    <div class="absolute bottom-8 left-8 flex space-x-2">
                        ${cur.images.map((_, i) => `<div class="dot ${i === sIdx ? 'active' : ''}"></div>`).join('')}
                    </div>
                    <div class="absolute inset-0 flex">
                        <div class="w-1/2 cursor-w-resize" onclick="changeS(-1)"></div>
                        <div class="w-1/2 cursor-e-resize" onclick="changeS(1)"></div>
                    </div>
                </div>
                <div class="p-8 lg:p-24 flex flex-col justify-center bg-[#050505]">
                    <div class="mb-4 text-[9px] tracking-[0.4em] uppercase opacity-30">Selection 0${cur.id}</div>
                    <h1 class="text-4xl lg:text-7xl font-bold uppercase tracking-tighter leading-[0.9] mb-8">${cur.name}</h1>
                    <p class="text-gray-500 font-light leading-relaxed mb-10 max-w-sm text-xs">${cur.desc}</p>
                    <div class="text-2xl font-bold tracking-tighter mb-12">R${cur.price.toFixed(2)}</div>
                    <button class="btn-luxury" onclick="add()">Add to selection</button>
                    <div class="mt-6 text-[8px] tracking-[0.2em] uppercase opacity-40 text-center cursor-pointer" onclick="closeModal()">Back to collection</div>
                </div>`;
        }

        function changeS(n) { sIdx = (sIdx + n + cur.images.length) % cur.images.length; renderM(); }

        function add() {
            const ex = cart.find(i => i.id === cur.id);
            if(ex) ex.q++; else cart.push({...cur, q: 1});
            closeModal(); updateCartUI(); toggleCart(true);
        }

        function updateCartUI() {
            let subt = 0; let totalQ = 0;
            document.getElementById('cart-list').innerHTML = cart.map((item, idx) => {
                subt += (item.price * item.q); totalQ += item.q;
                return `<div class="flex justify-between items-center mb-6 pb-6 border-b border-white/5">
                            <div class="flex items-center space-x-4">
                                <img src="${item.images[0]}" class="w-10 h-10 object-cover rounded-sm">
                                <div><b class="text-[9px] uppercase tracking-widest">${item.name}</b><br/><span class="text-[8px] opacity-30 uppercase tracking-tighter">Qty: ${item.q}</span></div>
                            </div>
                            <button onclick="rem(${idx})" class="text-[8px] opacity-40 hover:opacity-100 tracking-widest">REMOVE</button>
                        </div>`;
            }).join('');
            const total = subt > 0 ? subt + 100 : 0;
            document.getElementById('total-display').innerText = `R${total.toFixed(2)}`;
            document.getElementById('cart-count').innerText = totalQ;
        }

        function rem(idx) { cart.splice(idx, 1); updateCartUI(); }

        function processPayNow() {
            const f = document.getElementById('fn').value;
            const l = document.getElementById('ln').value;
            const e = document.getElementById('em').value;
            const p = document.getElementById('ph').value;
            const a = document.getElementById('adr').value;

            if(!f || !e || !p || !a || cart.length === 0) return alert("All fields required for secure delivery.");

            const subt = cart.reduce((s, i) => s + (i.price * i.q), 0);
            const total = (subt + 100).toFixed(2);
            const details = cart.map(i => `${i.name} (x${i.q})`).join(', ') + ` | PHONE: ${p} | SHIP: ${a}`;

            document.getElementById('pf-fn').value = f;
            document.getElementById('pf-ln').value = l;
            document.getElementById('pf-em').value = e;
            document.getElementById('pf-ph').value = p;
            document.getElementById('pf-amt').value = total;
            document.getElementById('pf-items').value = details;

            document.getElementById('pf-form').submit();
        }

        function toggleCart(s) { document.getElementById('cart').classList.toggle('open', s); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        init();
    </script>
</body>
</html>
