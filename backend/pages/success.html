<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

    <div class="success-card">

            <a href="index.html" class="block text-gray-500 uppercase tracking-widest text-[10px] hover:text-white transition">Back to Home</a>

    <script>
        // Clear the cart on success
        localStorage.removeItem('cart');
