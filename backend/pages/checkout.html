<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - DARKIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* UI Section: Checkout Inputs */
        input, textarea { border: 2px solid #e5e7eb !important; border-radius: 0px !important; }
        input:focus, textarea:focus { border-color: #000 !important; background: #fafafa !important; }
        .secure-badge { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body class="bg-white font-['Poppins']">

    <nav class="navbar border-b border-gray-100 py-6">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="../../index.html"><img src="../../shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="h-10"></a>
            <div class="flex items-center text-[10px] font-black uppercase tracking-widest text-gray-400">
                <i class="fas fa-lock mr-2 text-green-500"></i> Secure Encryption Active
            </div>
        </div>
    </nav>

    <section class="py-20 bg-black text-white text-center">
        <h1 class="text-5xl font-extrabold uppercase tracking-tighter">Finalize Order</h1>
        <p class="text-[10px] tracking-[0.4em] font-bold opacity-40 mt-4">SHADE IT LOW • WORLDWIDE SHIPPING</p>
    </section>

    <section class="py-24">
        <div class="container mx-auto px-6 max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-20">
            
            <div class="bg-gray-50 p-10 border border-gray-100 h-fit">
                <h3 class="text-lg font-black uppercase tracking-widest mb-10 border-b-2 border-black pb-4">Order Summary</h3>
                <div id="summary-items" class="space-y-6 mb-12"></div>
                <div class="border-t-2 border-black pt-8 flex justify-between items-end">
                    <div>
                        <span class="text-[10px] uppercase tracking-widest font-black text-gray-400 block mb-2">Total Payable</span>
                        <span class="text-sm font-bold uppercase">Incl. Vat & Shipping</span>
                    </div>
                    <span id="summary-total" class="text-5xl font-extrabold tracking-tighter text-black">R0.00</span>
                </div>
                <input type="hidden" id="cart-total-amount" value="0">
            </div>

            <div class="space-y-12">
                <h3 class="text-2xl font-extrabold uppercase tracking-tighter">Shipping & Billing</h3>
                <form id="payment-form" class="grid grid-cols-1 gap-8">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-black mb-3">Recipient Full Name</label>
                        <input type="text" id="name" required placeholder="Full Name"
                            class="w-full p-5 outline-none transition text-sm">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-black mb-3">Email Contact</label>
                        <input type="email" id="email" required placeholder="Email Address"
                            class="w-full p-5 outline-none transition text-sm">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest font-black mb-3">Mobile Number</label>
                            <input type="tel" id="phone" required placeholder="Phone Number"
                                class="w-full p-5 outline-none transition text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest font-black mb-3">Province/City</label>
                            <input type="text" id="city" required placeholder="City"
                                class="w-full p-5 outline-none transition text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-black mb-3">Full Residential Address</label>
                        <textarea id="address" rows="3" required placeholder="Street, Section, House Number"
                            class="w-full p-5 outline-none transition text-sm"></textarea>
                    </div>

                    <div class="pt-8">
                        <button type="button" id="pay-now-btn" class="w-full bg-black text-white py-6 font-black uppercase tracking-[0.4em] text-xs shadow-2xl hover:bg-zinc-800 transition">
                            Pay Securely with Ozow
                        </button>
                        <div class="flex justify-center items-center mt-10 space-x-6 opacity-30 grayscale">
                            <i class="fab fa-cc-visa text-3xl"></i>
                            <i class="fab fa-cc-mastercard text-3xl"></i>
                            <i class="fas fa-shield-alt text-2xl"></i>
                        </div>
                        <p class="text-center text-[9px] uppercase tracking-widest font-bold mt-6 text-gray-400">SSL Encrypted Checkout</p>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-black text-white py-16 text-center">
        <p class="tracking-[0.5em] text-[10px] font-bold opacity-30">&copy; 2026 DARKIS. Shade it Low.</p>
    </footer>

    <script src="../../js/script.js"></script>
</body>
</html>
