<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - DARKIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-['Poppins']">

    <nav class="navbar border-b border-gray-100 py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="../../index.html">
                <img src="../../shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="logo">
            </a>
            <div class="hidden md:flex space-x-8 uppercase tracking-widest text-sm font-medium">
                <a href="../../index.html">Home</a>
                <a href="../../shop.html">Shop</a>
                <a href="../../gallery.html">Gallery</a>
                <a href="../../cart.html">Cart</a>
                <a href="../../about.html">About</a>
            </div>
        </div>
    </nav>

    <section class="py-12 bg-black text-white text-center">
        <h1 class="text-4xl font-bold uppercase tracking-tighter">Secure Checkout</h1>
        <p class="text-xs tracking-[0.3em] opacity-60 mt-2">SHADE IT LOW • PAY SECURELY</p>
    </section>

    <section class="py-16">
        <div class="container mx-auto px-4 max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-16">
            
            <div class="bg-gray-50 p-8 border border-gray-200 h-fit">
                <h3 class="text-xl font-bold uppercase tracking-widest mb-8 border-b border-black pb-2">Your Order</h3>
                
                <div id="summary-items" class="space-y-4 mb-8">
                    </div>

                <div class="border-t-2 border-black pt-6 flex justify-between items-center">
                    <span class="text-sm uppercase tracking-[0.2em] font-bold">Total Amount</span>
                    <span id="summary-total" class="text-3xl font-bold text-black">R0.00</span>
                </div>
                
                <input type="hidden" id="cart-total-amount" value="0">
            </div>

            <div class="space-y-8">
                <h3 class="text-xl font-bold uppercase tracking-widest">Shipping & Contact</h3>
                
                <form id="payment-form" class="grid grid-cols-1 gap-6">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Full Name</label>
                        <input type="text" id="name" required placeholder="Onkabetse Galehole"
                            class="w-full p-4 border border-black rounded-none focus:bg-gray-50 outline-none transition">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Email Address</label>
                        <input type="email" id="email" required placeholder="khumo@darkis.co.za"
                            class="w-full p-4 border border-black rounded-none focus:bg-gray-50 outline-none transition">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Phone</label>
                            <input type="tel" id="phone" required placeholder="081 234 5678"
                                class="w-full p-4 border border-black rounded-none focus:bg-gray-50 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">City</label>
                            <input type="text" id="city" required placeholder="Kuruman"
                                class="w-full p-4 border border-black rounded-none focus:bg-gray-50 outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Delivery Address</label>
                        <textarea id="address" rows="3" required placeholder="664 Kutlwanong Section, Maruping"
                            class="w-full p-4 border border-black rounded-none focus:bg-gray-50 outline-none transition"></textarea>
                    </div>

                    <div class="pt-4">
                        <button type="button" id="pay-now-btn" class="your-styles-here">
    Pay Now with Ozow
</button>
                        <div class="flex justify-center items-center mt-6 space-x-4 opacity-40">
                            <i class="fab fa-cc-visa text-2xl"></i>
                            <i class="fab fa-cc-mastercard text-2xl"></i>
                            <span class="text-[10px] uppercase font-bold">Secure EFT Payment</span>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-black text-white py-12 text-center mt-20">
        <p class="tracking-[0.4em] text-[10px] opacity-50">&copy; 2026 DARKIS. Shade it Low.</p>
    </footer>

    <script src="../../js/script.js"></script>
</body>
</html>
