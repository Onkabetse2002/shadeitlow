<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKIS | Shade it low</title>
    <!-- 
        PREMIUM FONTS:
        - Cormorant Garamond: Sharp, high-fashion serif for the 'DARKIS' logo.
        - Montserrat: Minimalist sans-serif for the 'Shade it low' tagline.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* HERO - LUXURY Editorial Layout */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 0 30px;
        }

        .hero-image {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            object-position: center 15%; 
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(to top, #050505 30%, rgba(5,5,5,0.2) 100%);
        }

        @media (min-width: 1024px) {
            .hero { padding: 0 100px; }
            .hero-image { width: 60%; object-position: right 15%; }
            .overlay { background: linear-gradient(to right, #050505 25%, rgba(5,5,5,0.3) 65%, transparent 100%); }
        }

        /* Brand Hierarchy */
        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4.5rem, 15vw, 12rem);
            font-weight: 600;
            line-height: 0.8;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .tagline {
            font-size: clamp(10px, 2vw, 13px);
            text-transform: uppercase;
            letter-spacing: 0.9em; 
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            padding-left: 10px;
        }

        /* Buttons & Interaction */
        .btn-luxury {
            display: inline-block;
            margin-top: 50px;
            padding: 22px 60px;
            background: #fff;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            border-radius: 100px;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid #fff;
        }

        .btn-luxury:hover {
            background: transparent;
            color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
        }

        .footer-social-link {
            transition: all 0.3s ease;
            color: rgba(255,255,255,0.4);
        }
        .footer-social-link:hover {
            color: #fff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 py-10 px-10 flex justify-between items-center mix-blend-difference">
        <a href="index.html">
            <img src="shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="h-7 brightness-0 invert">
        </a>
        <div class="hidden md:flex space-x-12">
            <a href="index.html" class="text-[9px] tracking-[0.4em] uppercase font-bold text-white">Home</a>
            <a href="shop.html" class="text-[9px] tracking-[0.4em] uppercase font-bold text-white/50 hover:text-white transition">Shop</a>
            <a href="gallery.html" class="text-[9px] tracking-[0.4em] uppercase font-bold text-white/50 hover:text-white transition">Archive</a>
        </div>
        <a href="shop.html" class="text-white text-lg"><i class="fas fa-shopping-bag"></i></a>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <img src="shadesimages/models/homemodel.jpeg" alt="DARKIS" class="hero-image">
        <div class="overlay"></div>

        <div class="relative z-10 w-full max-w-7xl mx-auto">
            <div class="flex flex-col items-start">
                <span class="text-[10px] tracking-[0.6em] uppercase opacity-30 mb-8">Editorial // 2026</span>
                <h1 class="main-title">DARKIS</h1>
                <p class="tagline">Shade it low</p>
                <div class="mt-12">
                    <a href="shop.html" class="btn-luxury">Enter Shop</a>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-32 bg-[#050505] px-10 border-t border-white/5">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-20 mb-32">
                <div class="md:col-span-2">
                    <img src="shadesimages/logo/Dark Logo 1.svg" class="h-6 mb-10 brightness-0 invert opacity-30">
                    <p class="text-gray-600 text-[9px] uppercase tracking-widest leading-loose max-w-xs">
                        Redefining South African luxury from the Northern Cape. Crafted for the bold.
                    </p>
                </div>
                
                <div class="flex flex-col space-y-6">
                    <h4 class="text-[10px] uppercase tracking-widest text-white/20">Navigate</h4>
                    <a href="shop.html" class="text-[10px] tracking-[0.3em] uppercase hover:text-white transition">Collection</a>
                    <a href="gallery.html" class="text-[10px] tracking-[0.3em] uppercase hover:text-white transition">Archive</a>
                    <a href="about.html" class="text-[10px] tracking-[0.3em] uppercase hover:text-white transition">About</a>
                </div>

                <div class="flex flex-col space-y-6">
                    <h4 class="text-[10px] uppercase tracking-widest text-white/20">Legal</h4>
                    <a href="privacy-policy.html" class="text-[10px] tracking-[0.3em] uppercase hover:text-white transition">Privacy</a>
                    <a href="terms&conditions.html" class="text-[10px] tracking-[0.3em] uppercase hover:text-white transition">Terms</a>
                    <a href="return-and-refund-policy.html" class="text-[10px] tracking-[0.3em] uppercase hover:text-white transition">Returns</a>
                </div>
            </div>

            <!-- Bottom Copyright & Social Icons -->
            <div class="flex flex-col md:flex-row justify-between items-center opacity-40 border-t border-white/5 pt-12 gap-8">
                <p class="text-[8px] uppercase tracking-[0.5em]">&copy; 2026 DARKIS.</p>
                
                <div class="flex space-x-8 text-xl">
                    <!-- WhatsApp -->
                    <a href="https://wa.me/27683811938" target="_blank" class="footer-social-link">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <!-- Instagram -->
                    <a href="https://www.instagram.com/shade_it_low_with_darkis?igsh=MWJsaTljZGd4cjNzdQ==" target="_blank" class="footer-social-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <!-- TikTok -->
                    <a href="https://www.tiktok.com/@shade_it_low_with_darkis?_r=1&_t=ZS-93kYvR4PaTa" target="_blank" class="footer-social-link">
                        <i class="fab fa-tiktok"></i>
                    </a>
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/share/1N85wS2pcx/" target="_blank" class="footer-social-link">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
