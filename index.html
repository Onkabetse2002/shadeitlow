<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKIS - Shade It Low</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; overflow-x: hidden; }
        
        .navbar { 
            background: rgba(10, 10, 10, 0.98); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-links a { color: #fff !important; font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 700; opacity: 0.8; transition: 0.3s; }
        
        /* Mobile Menu Style */
        #mobile-menu-overlay {
            position: fixed; inset: 0; background: #0a0a0a; z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #mobile-menu-overlay a { font-size: 2rem; font-weight: 800; text-transform: uppercase; margin: 15px 0; letter-spacing: -0.02em; }

        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; background: #0a0a0a; overflow: hidden; }
        .hero-bg-image {
            position: absolute; top: 0; right: 0; width: 50%; height: 100%;
            background: url('shadesimages/models/homemodel.jpeg') no-repeat center center;
            background-size: cover; z-index: 1; filter: grayscale(20%);
        }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, #0a0a0a 40%, rgba(10,10,10,0.2) 100%); z-index: 2; }
        .hero-content { position: relative; z-index: 3; width: 100%; }
        .hero-headline { font-family: 'Poppins'; font-size: clamp(3.5rem, 12vw, 9rem); font-weight: 800; text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.85; }

        @media (max-width: 768px) {
            .hero-bg-image { width: 100%; opacity: 0.5; }
            .hero-overlay { background: linear-gradient(to top, #0a0a0a 50%, rgba(10,10,10,0.3) 100%); }
            .hero-headline { font-size: 4rem !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar py-8">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html"><img src="shadesimages/logo/Dark Logo 1.svg" alt="DARKIS" class="h-10 brightness-0 invert"></a>
            <div class="nav-links hidden md:flex space-x-12">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="gallery.html">Gallery</a>
                <a href="about.html">About</a>
            </div>
            <button class="md:hidden text-white text-2xl" onclick="toggleMenu(true)"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div id="mobile-menu-overlay">
        <button class="absolute top-10 right-10 text-white text-3xl" onclick="toggleMenu(false)">&times;</button>
        <a href="index.html" onclick="toggleMenu(false)">Home</a>
        <a href="shop.html" onclick="toggleMenu(false)">Shop</a>
        <a href="gallery.html" onclick="toggleMenu(false)">Gallery</a>
        <a href="about.html" onclick="toggleMenu(false)">About</a>
    </div>

    <section class="hero">
        <div class="hero-bg-image"></div>
        <div class="hero-overlay"></div>
        <div class="container mx-auto px-6 hero-content">
            <div class="max-w-4xl">
                <h1 class="hero-headline">SHADE <br/><span class="text-zinc-700 italic">IT LOW.</span></h1>
                <p class="mt-8 text-[10px] tracking-[0.5em] uppercase text-zinc-400 font-bold max-w-sm leading-relaxed">
                    Understated Luxury. <br>Crafted for the modern narrative.
                </p>
                <div class="mt-12">
                    <a href="shop.html" class="inline-block bg-white text-black px-12 py-5 font-black uppercase tracking-widest text-xs hover:bg-zinc-200 transition">Enter Collection</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        function toggleMenu(show) {
            const menu = document.getElementById('mobile-menu-overlay');
            menu.style.display = show ? 'flex' : 'none';
            // Stop background scrolling when menu is open
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }
    </script>
</body>
</html>
